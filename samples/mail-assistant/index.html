<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mail-assistant</title>
  </head>

  <body>
    <div id="app">
      <h1>Mail Assistant 💻</h1>
      <section>
        <button id="start-button" class="counter">Start demo</button>
      </section>
      <p id="loading" style="display: none">Loading...</p>
      <div id="mail-form" style="display: none">
        <section>
          <p><label for="title">Title</label></p>
          <input name="title" type="text" id="title" />
        </section>
        <section>
          <p><label for="content">Content</label></p>
          <textarea id="content" name="content"></textarea>
        </section>
        <section>
          <div>
            Next word suggestion will appear here:
            <span id="next-word-suggestion"></span>
          </div>
        </section>
        <section>
          <button id="send-btn">Send</button>
        </section>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
